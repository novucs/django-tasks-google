name: Release

on:
  push:
    tags:
      - v*

jobs:
  verify:
    uses: ./.github/workflows/verify.yml

  pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: verify
    environment:
      name: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build
        run: uv build
      - name: Publish
        run: uv publish
